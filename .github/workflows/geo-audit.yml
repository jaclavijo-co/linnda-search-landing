name: GEO Audit · AI Search Visibility

on:
  # Ejecutar en cada push a main
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'public/**'
      - '.github/workflows/geo-audit.yml'

  # Ejecutar en pull requests a main
  pull_request:
    branches: [main]
    paths:
      - 'index.html'
      - 'public/**'

  # Ejecutar semanalmente (lunes 9am UTC = 4am Bogotá)
  schedule:
    - cron: '0 9 * * 1'

  # Permitir trigger manual
  workflow_dispatch:

jobs:
  geo-audit:
    name: Audit AI search visibility
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run GEO Optimizer audit
        id: geo-audit
        uses: Auriti-Labs/geo-optimizer-skill@v1
        with:
          url: https://search.linnda.co
          # No fallar el build por ahora — solo reportar.
          # Cambiar a un valor (ej. 70) cuando la baseline esté estable.
          min-score: 0
          format: sarif
        continue-on-error: true

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: geo-audit.sarif
          category: geo-optimizer
        continue-on-error: true

      - name: Generate human-readable report
        if: always()
        uses: Auriti-Labs/geo-optimizer-skill@v1
        with:
          url: https://search.linnda.co
          format: html
          output: geo-report.html
        continue-on-error: true

      - name: Upload report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: geo-audit-report
          path: geo-report.html
          retention-days: 30

      - name: Comment on PR with score
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const score = '${{ steps.geo-audit.outputs.score }}' || 'N/A';
            const band = '${{ steps.geo-audit.outputs.band }}' || 'unknown';
            const body = `## 🧭 GEO Audit Results

            **Score:** ${score}/100 (${band})

            See the full HTML report in the workflow artifacts.

            Score bands:
            - 86-100 Excellent
            - 68-85 Good
            - 36-67 Foundation
            - 0-35 Critical`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
